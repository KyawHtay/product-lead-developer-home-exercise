<div class="container">
  <h2>Person List</h2>
  <button (click)="addPerson()" class="btn btn-primary">Add New Person</button>
  <table class="table">
    <thead>
      <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Department</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let person of people">
        <td>{{ person.firstName }}</td>
        <td>{{ person.lastName }}</td>
        <td>{{ person.email }}</td>
        <td>{{ person.department?.name }}</td>
        <td>
          <button (click)="editPerson(person.id)" class="btn btn-warning">Edit</button>
          <button (click)="deletePerson(person.id)" class="btn btn-danger ml-2">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
